<body>
    <div>
        <nav class="back-link">
            <a href="project.html" class="Back"><span>G</span><span>o</span> <span></span> <span>b</span><span>a</span><span>c</span><span>k</span></a>
        </nav>
    </div>

    <section id="register" aria-label="REGISTRATION FORM">
        <div class="container">
            <h1 class="register">REGISTRATION FORM</h1>
            <form class="register-form" id="regForm">
                <input type="text"  name="name"   placeholder="Your full name"              required>
                <input type="email" name="email"  placeholder="Email address"               required>
                <input type="tel"   name="phone"  placeholder="Phone number (11 digits)"
                       pattern="[0-9]{11}" required>
                <select name="gender" required>
                    <option value="">Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                </select>
                <input type="date" name="date" required>
                <label class="checkbox">
                    <input type="checkbox" name="consent" required>
                    I agree to register in this class.
                </label>
                <button type="submit" class="btn primary">Submit via WhatsApp</button>
            </form>
        </div>
    </section>

    <script>
        document.getElementById('regForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const form = e.target;

            const name   = form.name.value.trim();
            const email  = form.email.value.trim();
            const phone  = form.phone.value.trim();
            const gender = form.gender.value;
            const date   = form.date.value;

            // ✅ REPLACE THIS with your own WhatsApp number (include country code, no + or spaces)
            // Example: Nigeria +234 8012345678 → 2348012345678
            const yourWhatsAppNumber = '2349169671443';

            const message =
                `📋 *New Registration*\n\n` +
                `👤 *Name:* ${name}\n` +
                `📧 *Email:* ${email}\n` +
                `📞 *Phone:* ${phone}\n` +
                `🚻 *Gender:* ${gender}\n` +
                `📅 *Date:* ${date}\n` +
                `✅ *Consent:* Agreed`;

            const encoded = encodeURIComponent(message);
            const url = `https://wa.me/${yourWhatsAppNumber}?text=${encoded}`;

            window.open(url, '_blank');
        });
    </script>
</body>
